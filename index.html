<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিক্ষার্থী ড্যাশবোর্ড - স্মার্ট কুইজ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 95%; max-width: 450px; background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .header-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; text-align: left; }
        .profile-pic { width: 80px; height: 106px; border: 1px solid #000; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .profile-info { color: var(--primary); line-height: 1.4; text-align: left; flex-grow: 1; }
        .profile-info h2 { margin: 0; font-size: 20px; font-weight: 900; color: #1a202c; }
        .profile-info p { margin: 1px 0; font-size: 13px; font-weight: 600; color: #4a5568; }
        .divider { height: 1.5px; background-color: #000; margin: 10px 0 20px 0; border: none; }
        .profile-header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; }
        .info-item b { opacity: 0.8; font-weight: normal; font-size: 0.8rem; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #dashboard { display: none; }
        .quiz-card { background: #fff; padding: 15px; border-radius: 18px; margin-top: 15px; border: 1px solid #e1e8ed; text-align: left; position: relative; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 5px; background: #e8f5e9; color: var(--success); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-section" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info">
            <h2>Palash Mahmod</h2>
            <p>BSC(SCIENCE), MSC(BOTANY)</p>
            <p>Mob: 01757935522</p>
        </div>
    </div>
    <hr class="divider">
    <h2 style="color: var(--primary); margin: 0 0 15px 0;">শিক্ষার্থী প্রবেশদ্বার</h2>
    
    <input type="text" id="uName" placeholder="সম্পূর্ণ নাম">
    <div style="display: flex; gap: 10px;">
        <input type="text" id="uClass" placeholder="শ্রেণি">
        <input type="text" id="uSection" placeholder="শাখা">
    </div>
    <div style="display: flex; gap: 10px;">
        <input type="number" id="uRoll" placeholder="রোল নং">
        <input type="number" id="uID" placeholder="আইডি নং">
    </div>
    <input type="number" id="uPass" placeholder="পিন পাসওয়ার্ড">
    <button class="btn" id="loginBtn" onclick="login()">প্রবেশ করুন</button>
</div>

<div id="dashboard" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info">
            <h2 id="dispProfileName">Palash Mahmod</h2>
            <p>BSC(SCIENCE), MSC(BOTANY)</p>
            <p>Mob: 01757935522</p>
        </div>
    </div>
    <hr class="divider">
    
    <div class="profile-header">
        <h3 id="welcomeMsg" style="margin:0 0 10px 0;">স্বাগতম</h3>
        <div class="info-grid">
            <div class="info-item"><b>আইডি নং</b> <span id="dispID"></span></div>
            <div class="info-item"><b>শ্রেণি</b> <span id="dispClass"></span></div>
            <div class="info-item"><b>শাখা</b> <span id="dispSection"></span></div>
            <div class="info-item"><b>রোল</b> <span id="dispRoll"></span></div>
        </div>
    </div>

    <div id="quizList"></div>
    <div id="noQuiz" style="margin-top:20px; color:#95a5a6; display:none;">বর্তমানে কোনো পরীক্ষা নেই।</div>

    <button class="btn" style="background:#fdf0ef; color:#e74c3c; margin-top:25px; border:1px solid #fadbd8;" onclick="logout()">লগআউট করুন</button>
</div>

<script>
    // Firebase Config (আপনার দেওয়া তথ্য অনুযায়ী)
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", 
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let currentUser = JSON.parse(localStorage.getItem('loggedUser'));

    window.onload = () => {
        if(currentUser) showDashboard();
    };

    function login() {
        const name = document.getElementById('uName').value.trim();
        const cls = document.getElementById('uClass').value.trim();
        const sec = document.getElementById('uSection').value.trim();
        const roll = document.getElementById('uRoll').value.trim();
        const id = document.getElementById('uID').value.trim();
        const pass = document.getElementById('uPass').value.trim();

        if(!name || !cls || !sec || !roll || !id || !pass) return alert("সবগুলো বক্স পূরণ করুন।");

        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="loader"></span> যাচাই হচ্ছে...';
        btn.disabled = true;

        // শুধু আইডি ও পিন যাচাই
        db.ref('users/' + id).once('value', (snapshot) => {
            const userData = snapshot.val();
            // userData.password বা userData.pin যেকোনো একটি চেক করবে (আপনার file_A অনুযায়ী)
            if (userData && (userData.password == pass || userData.pin == pass)) {
                currentUser = { name, cls, sec, roll, id };
                localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                
                // কুইজ ফাইলের জন্য লোকাল স্টোরেজে আলাদা কি (Key) সেভ করা
                localStorage.setItem("uName", name);
                localStorage.setItem("uClass", cls);
                localStorage.setItem("uSection", sec);
                localStorage.setItem("uRoll", roll);
                localStorage.setItem("uId", id);

                showDashboard();
            } else {
                alert("আইডি নম্বর বা পিন সঠিক নয়!");
                btn.disabled = false;
                btn.innerText = 'প্রবেশ করুন';
            }
        }).catch(err => {
            alert("নেটওয়ার্ক সমস্যা!");
            btn.disabled = false;
            btn.innerText = 'প্রবেশ করুন';
        });
    }

    function showDashboard() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        document.getElementById('welcomeMsg').innerText = currentUser.name;
        document.getElementById('dispID').innerText = currentUser.id;
        document.getElementById('dispClass').innerText = currentUser.cls;
        document.getElementById('dispSection').innerText = currentUser.sec;
        document.getElementById('dispRoll').innerText = currentUser.roll;

        fetchQuizzes();
    }

    function fetchQuizzes() {
        const listDiv = document.getElementById('quizList');
        // file_B তে ব্যবহৃত quiz_list পাথ থেকে ডেটা আনা
        db.ref('quiz_list').on('value', (snapshot) => {
            listDiv.innerHTML = '';
            const data = snapshot.val();
            let hasQuiz = false;

            if(data) {
                for(let key in data) {
                    if(data[key].status === "on") {
                        hasQuiz = true;
                        const card = document.createElement('div');
                        card.className = 'quiz-card';
                        card.innerHTML = `
                            <span class="status-badge">অনলাইন পরীক্ষা</span>
                            <div style="font-weight:bold; color:var(--primary); margin-bottom:10px;">${data[key].title}</div>
                            <div style="font-size:12px; color:#666;">বিষয়: ${data[key].sub} | শ্রেণি: ${data[key].cls}</div>
                            <button class="btn" onclick="openQuiz('${data[key].fileName}')">পরীক্ষা শুরু করুন</button>
                        `;
                        listDiv.appendChild(card);
                    }
                }
            }
            document.getElementById('noQuiz').style.display = hasQuiz ? 'none' : 'block';
        });
    }

    function openQuiz(fileName) {
        // GitHub থেকে ফাইলটি সরাসরি ওপেন করা
        const user = "palashmahmod";
        const repo = "quiz-files";
        window.location.href = `https://${user}.github.io/${repo}/${fileName}.html`;
    }

    function logout() {
        if (prompt("লগআউট পাসওয়ার্ড দিন:") === "pm5522") {
            localStorage.clear(); // সব তথ্য মুছে ফেলা
            location.reload();
        } else {
            alert("ভুল পাসওয়ার্ড!");
        }
    }
</script>
</body>
</html>
