<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিক্ষার্থী ড্যাশবোর্ড - স্মার্ট কুইজ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 95%; max-width: 450px; background: #ffffff; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .header-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; text-align: left; }
        .profile-pic { width: 80px; height: 106px; border: 1px solid #000; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .profile-info { color: var(--primary); line-height: 1.4; text-align: left; flex-grow: 1; }
        .profile-info h2 { margin: 0; font-size: 20px; font-weight: 900; color: #1a202c; }
        .profile-info p { margin: 1px 0; font-size: 13px; font-weight: 600; color: #4a5568; }
        .divider { height: 1.5px; background-color: #000; margin: 10px 0 20px 0; border: none; }
        .profile-header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; }
        .info-item b { opacity: 0.8; font-weight: normal; font-size: 0.8rem; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #dashboard { display: none; }
        .quiz-card { background: #fff; padding: 15px; border-radius: 18px; margin-top: 15px; border: 1px solid #e1e8ed; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 5px; background: #e8f5e9; color: var(--success); }
        
        /* কুইজ ওভারলে এবং আইফ্রেম স্টাইল */
        #quiz-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-quiz { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 10001; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="login-section" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info">
            <h2>Palash Mahmod</h2>
            <p>BSC(SCIENCE), MSC(BOTANY)</p>
            <p>Mob: 01757935522</p>
        </div>
    </div>
    <hr class="divider">
    <h2 style="color: var(--primary); margin: 0 0 15px 0;">শিক্ষার্থী প্রবেশদ্বার</h2>
    <input type="text" id="uName" placeholder="সম্পূর্ণ নাম">
    <div style="display: flex; gap: 10px;">
        <input type="text" id="uClass" placeholder="শ্রেণি">
        <input type="text" id="uSection" placeholder="শাখা">
    </div>
    <div style="display: flex; gap: 10px;">
        <input type="number" id="uRoll" placeholder="রোল নং">
        <input type="number" id="uID" placeholder="আইডি নং">
    </div>
    <input type="number" id="uPass" placeholder="পিন পাসওয়ার্ড">
    <button class="btn" onclick="login()">প্রবেশ করুন</button>
</div>

<div id="dashboard" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info"><h2>Palash Mahmod</h2><p>BSC(SCIENCE), MSC(BOTANY)</p><p>Mob: 01757935522</p></div>
    </div>
    <hr class="divider">
    <div class="profile-header">
        <h3 id="welcomeMsg" style="margin:0 0 10px 0;">স্বাগতম</h3>
        <div class="info-grid">
            <div class="info-item"><b>আইডি নং</b> <span id="dispID"></span></div>
            <div class="info-item"><b>শ্রেণি</b> <span id="dispClass"></span></div>
            <div class="info-item"><b>শাখা</b> <span id="dispSection"></span></div>
            <div class="info-item"><b>রোল</b> <span id="dispRoll"></span></div>
        </div>
    </div>
    <div id="quizList"></div>
    <div id="noQuiz" style="margin-top:20px; color:#95a5a6; display:none;">বর্তমানে কোনো পরীক্ষা নেই।</div>
    <button class="btn" style="background:#fdf0ef; color:#e74c3c; margin-top:25px; border:1px solid #fadbd8;" onclick="logout()">লগআউট করুন</button>
</div>

<div id="quiz-container">
    <button class="close-quiz" onclick="closeQuiz()">বন্ধ করুন (Back)</button>
    <iframe id="quizFrame"></iframe>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", 
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    let currentUser = JSON.parse(localStorage.getItem('loggedUser'));

    window.onload = () => { if(currentUser) showDashboard(); };

    function login() {
        const fields = ['uName', 'uClass', 'uSection', 'uRoll', 'uID', 'uPass'];
        const values = {};
        for(let f of fields) {
            values[f] = document.getElementById(f).value.trim();
            if(!values[f]) return alert("সবগুলো বক্স পূরণ করুন।");
        }
        db.ref('users/' + values.uID).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && (data.password == values.uPass || data.pin == values.uPass)) {
                currentUser = { name: values.uName, cls: values.uClass, sec: values.uSection, roll: values.uRoll, id: values.uID };
                localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                showDashboard();
            } else {
                alert("আইডি বা পিন ভুল!");
            }
        });
    }

    function showDashboard() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = currentUser.name;
        document.getElementById('dispID').innerText = currentUser.id;
        document.getElementById('dispClass').innerText = currentUser.cls;
        document.getElementById('dispSection').innerText = currentUser.sec;
        document.getElementById('dispRoll').innerText = currentUser.roll;
        fetchQuizzes();
    }

    function fetchQuizzes() {
        const listDiv = document.getElementById('quizList');
        db.ref('quiz_control').on('value', (snapshot) => {
            listDiv.innerHTML = '';
            let hasQuiz = false;
            const data = snapshot.val();
            if(data) {
                for(let key in data) {
                    const studentStatus = data[key][currentUser.id];
                    if(studentStatus === true) {
                        hasQuiz = true;
                        const card = document.createElement('div');
                        card.className = 'quiz-card';
                        card.innerHTML = `
                            <span class="status-badge">লাইভ পরীক্ষা</span>
                            <div style="font-weight:bold; color:var(--primary);">পরীক্ষার কোড: ${key}</div>
                            <button class="btn" onclick="openQuiz('${key}')">পরীক্ষা শুরু করুন</button>
                        `;
                        listDiv.appendChild(card);
                    }
                }
            }
            document.getElementById('noQuiz').style.display = hasQuiz ? 'none' : 'block';
        });
    }

    function openQuiz(fileName) {
        const user = "palashmahmod";
        const repo = "quiz-files";
        const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${fileName}.html`;
        
        const container = document.getElementById('quiz-container');
        const frame = document.getElementById('quizFrame');
        
        fetch(rawUrl)
            .then(response => {
                if (response.ok) return response.text();
                throw new Error('Not Found');
            })
            .then(html => {
                container.style.display = 'block';
                
                // আইফ্রেমের ভেতরে কন্টেন্ট এবং অটো-ফিল স্ক্রিপ্ট লিখছি
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(html);
                
                // তথ্য অটো-ফিল করার জন্য ইনজেকশন
                const autoFillScript = `
                <script>
                    setTimeout(() => {
                        if(document.getElementById('studentName')) document.getElementById('studentName').innerText = "${currentUser.name}";
                        if(document.getElementById('studentRoll')) document.getElementById('studentRoll').innerText = "${currentUser.roll}";
                        if(document.getElementById('studentClass')) document.getElementById('studentClass').innerText = "${currentUser.cls}";
                        if(document.getElementById('studentSection')) document.getElementById('studentSection').innerText = "${currentUser.sec}";
                        
                        // ইনপুট ফিল্ড থাকলে
                        const nameInput = document.querySelector('input[name="name"]');
                        if(nameInput) nameInput.value = "${currentUser.name}";
                        const rollInput = document.querySelector('input[name="roll"]');
                        if(rollInput) rollInput.value = "${currentUser.roll}";
                    }, 500);
                <\/script>`;
                
                doc.write(autoFillScript);
                doc.close();
            })
            .catch(err => {
                alert("ত্রুটি: কুইজ ফাইলটি লোড করা যাচ্ছে না। কোডটি চেক করুন।");
            });
    }

    function closeQuiz() {
        if(confirm("আপনি কি পরীক্ষা থেকে বের হতে চান?")) {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('quizFrame').src = "";
        }
    }

    function logout() {
        if (prompt("লগআউট পাসওয়ার্ড:") === "pm5522") {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
