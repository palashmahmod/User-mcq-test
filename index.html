<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 90%; 
            max-width: 400px; 
            overflow: hidden;
            position: relative;
        }

        .header-profile {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            padding: 20px 20px 5px 20px;
            background: #fff;
        }

        .profile-pic {
            width: 80px;
            height: 106px;
            border: 1px solid #000;
            object-fit: cover;
            border-radius: 4px;
        }

        .profile-info {
            color: var(--primary-color);
            line-height: 1.4;
            text-align: left;
        }

        .profile-info h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: #1a202c;
        }

        .profile-info p {
            margin: 1px 0;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }

        .divider {
            height: 1.5px;
            background-color: #000;
            margin: 10px 20px 20px 20px;
            border: none;
        }

        .main-content { padding: 0 25px 25px 25px; text-align: center; }
        
        .user-details-card {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            border-radius: 25px;
            padding: 20px;
            color: white;
            text-align: left;
            margin-bottom: 20px;
        }

        .user-details-card h2 {
            margin: 0 0 15px 0;
            font-size: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-item label {
            display: block;
            font-size: 13px;
            opacity: 0.8;
        }

        .info-item span {
            font-size: 16px;
            font-weight: bold;
        }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn:active { transform: scale(0.98); }
        
        #home-screen { display: none; }
        .quiz-btn { background: #27ae60; margin-top: 10px; animation: pulse 2s infinite; width: 100%; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.01); } 100% { transform: scale(1); } }
        
        .loader-text { color: #f39c12; font-weight: bold; display: none; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info">
            <h2>Palash Mahmod</h2>
            <p>BSC(SCIENCE), MSC(BOTANY)</p>
            <p>Mob: 01757935522</p>
        </div>
    </div>
    <hr class="divider">
    
    <div class="main-content">
        <i class="fas fa-user-graduate" style="font-size: 40px; color: #3498db; margin-bottom: 15px;"></i>
        <h2 style="margin-top:0;">শিক্ষার্থী লগইন</h2>
        <input type="number" id="loginId" placeholder="আইডি নং">
        <input type="number" id="loginPin" placeholder="পিন নম্বর">
        <button class="btn" onclick="handleLogin()">লগইন করুন</button>
    </div>
</div>

<div id="home-screen" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info">
            <h2>Palash Mahmod</h2>
            <p>BSC(SCIENCE), MSC(BOTANY)</p>
            <p>Mob: 01757935522</p>
        </div>
    </div>
    <hr class="divider">

    <div class="main-content">
        <div class="user-details-card">
            <h2 id="uNameDisplay">নাম লোড হচ্ছে...</h2>
            <div class="info-grid">
                <div class="info-item"><label>আইডি নং</label><span id="uIdDisplay">----</span></div>
                <div class="info-item"><label>শ্রেণি</label><span id="uClassDisplay">----</span></div>
                <div class="info-item"><label>শাখা</label><span id="uSecDisplay">----</span></div>
                <div class="info-item"><label>রোল</label><span id="uRollDisplay">----</span></div>
            </div>
        </div>

        <div id="quiz-list-area"><p style="color: #888;">লোড হচ্ছে...</p></div>
        <p id="check-msg" class="loader-text"><i class="fas fa-spinner fa-spin"></i> যাচাই হচ্ছে...</p>
        <button class="btn" style="background:#e74c3c; margin-top:30px;" onclick="protectedLogout()">লগআউট</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        const pin = document.getElementById('loginPin').value.trim();
        if(!id || !pin) return alert("আইডি ও পিন দিন");

        db.ref('users/' + id).once('value', (snap) => {
            const user = snap.val();
            if(user && user.password == pin) {
                user.id = id;
                localStorage.setItem('loggedUser', JSON.stringify(user));
                showHome();
            } else { alert("আইডি বা পিন ভুল!"); }
        });
    }

    function showHome() {
        const user = JSON.parse(localStorage.getItem('loggedUser'));
        if(!user) return;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';

        document.getElementById('uNameDisplay').innerText = user.name;
        document.getElementById('uIdDisplay').innerText = user.id;
        document.getElementById('uClassDisplay').innerText = user.class || user.cls || "N/A";
        document.getElementById('uSecDisplay').innerText = user.section || user.sec || "N/A";
        document.getElementById('uRollDisplay').innerText = user.roll || "N/A";

        db.ref('IndividualQuizzes/' + user.id).on('value', (snap) => {
            const area = document.getElementById('quiz-list-area');
            const data = snap.val();
            area.innerHTML = "";
            if(data) {
                Object.keys(data).forEach(key => {
                    const q = data[key];
                    area.innerHTML += `
                        <button class="btn quiz-btn" onclick="checkAndGo('${q.file}', '${q.title}')">
                            <i class="fas fa-book-open"></i> ${q.title}
                        </button>`;
                });
            } else {
                area.innerHTML = "<p style='color: #888;'>বর্তমানে কোনো কুইজ নেই।</p>";
            }
        });
    }

    function checkAndGo(fileName, quizTitle) {
        const user = JSON.parse(localStorage.getItem('loggedUser'));
        document.getElementById('check-msg').style.display = "block";
        db.ref('QuizResults').orderByChild('userId').equalTo(user.id).once('value', (snap) => {
            document.getElementById('check-msg').style.display = "none";
            let done = false;
            if(snap.val()) {
                Object.values(snap.val()).forEach(res => {
                    if(res.quizTitle === quizTitle) done = true;
                });
            }
            if(done) alert("আপনি ইতিমধ্যে এই পরীক্ষাটি দিয়েছেন!");
            else goToExam(fileName);
        });
    }

    // সংশোধিত ফাংশন ( .html যুক্ত করা হয়েছে )
    function goToExam(fileName) {
        const user = JSON.parse(localStorage.getItem('loggedUser'));
        const params = new URLSearchParams({
            id: user.id, 
            name: user.name, 
            roll: user.roll || "N/A", 
            cls: user.class || user.cls || "N/A", 
            sec: user.section || user.sec || "N/A"
        }).toString();
        // নিচের লাইনে fileName এর পর .html যোগ করা হয়েছে
        window.location.href = `https://palashmahmod.github.io/quiz-files/${fileName}.html?${params}`;
    }

    function protectedLogout() {
        const pass = prompt("লগআউট করতে পাসওয়ার্ড দিন:");
        if (pass === "pm5522") {
            localStorage.removeItem('loggedUser');
            location.reload();
        } else if (pass !== null) {
            alert("ভুল পাসওয়ার্ড!");
        }
    }

    window.onload = () => { if(localStorage.getItem('loggedUser')) showHome(); }
</script>
</body>
</html>
