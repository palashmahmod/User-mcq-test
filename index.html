<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App - index</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #FFFBF0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #home-screen { display: none; }
        .quiz-btn { background: #27ae60; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>স্টুডেন্ট লগইন</h2>
    <input type="number" id="loginId" placeholder="আইডি নং (English)">
    <input type="number" id="loginPin" placeholder="পিন নম্বর (English)">
    <button class="btn" onclick="handleLogin()">লগইন করুন</button>
</div>

<div id="home-screen" class="card">
    <h3 id="uName">স্বাগতম!</h3>
    <p id="uInfo"></p>
    <hr>
    <div id="quiz-list-area">
        <p>সক্রিয় কোনো পরীক্ষা নেই।</p>
    </div>
    <button class="btn" style="background:#e74c3c; margin-top:20px;" onclick="logout()">লগআউট</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function handleLogin() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('loginPin').value;

        db.ref('users/' + id).once('value', (snap) => {
            const user = snap.val();
            if(user && user.password == pin) {
                localStorage.setItem('loggedUser', JSON.stringify(user));
                showHome();
            } else {
                alert("আইডি বা পিন ভুল!");
            }
        });
    }

    function showHome() {
        const user = JSON.parse(localStorage.getItem('loggedUser'));
        if(!user) return;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('uName').innerText = "স্বাগতম, " + user.name;
        document.getElementById('uInfo').innerText = `শ্রেণি: ${user.cls} | রোল: ${user.roll}`;

        // কুইজ অন/অফ চেক (file_C এর লজিক)
        db.ref('quiz_control').on('value', (snap) => {
            const control = snap.val();
            const area = document.getElementById('quiz-list-area');
            if(control && control.status === "on") {
                area.innerHTML = `
                    <button class="btn quiz-btn" style="display:block" onclick="goToExam('${control.file}')">
                        <i class="fas fa-edit"></i> ${control.title || 'পরীক্ষা শুরু করুন'}
                    </button>`;
            } else {
                area.innerHTML = "<p>বর্তমানে কোনো পরীক্ষা নেই।</p>";
            }
        });
    }

    function goToExam(fileName) {
        // এখানে গিটহাবের পেজে রিডাইরেক্ট হবে
        window.location.href = `https://palashmahmod.github.io/quiz-files/${fileName}.html`;
    }

    function logout() {
        localStorage.removeItem('loggedUser');
        location.reload();
    }

    // অটো লগইন চেক
    if(localStorage.getItem('loggedUser')) {
        showHome();
    }
</script>
</body>
</html>
