<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>শিক্ষার্থী ড্যাশবোর্ড - স্মার্ট কুইজ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 90%; max-width: 450px; background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .header-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; text-align: left; }
        .profile-pic { width: 80px; height: 106px; border: 1px solid #000; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .profile-info { color: var(--primary); line-height: 1.4; text-align: left; flex-grow: 1; }
        .profile-info h2 { margin: 0; font-size: 20px; font-weight: 900; color: #1a202c; white-space: nowrap; }
        .profile-info p { margin: 1px 0; font-size: 13px; font-weight: 600; color: #4a5568; word-wrap: break-word; }
        .divider { height: 1.5px; background-color: #000; margin: 10px 0 20px 0; border: none; }
        .profile-header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; }
        .info-item b { opacity: 0.8; font-weight: normal; font-size: 0.8rem; display: block; }
        .info-item span { font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #dashboard { display: none; }
        .quiz-card { background: #fff; padding: 20px; border-radius: 18px; margin-top: 20px; border: 1px solid #e1e8ed; text-align: left; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .online { background: #e8f5e9; color: var(--success); }
        .offline { background: #ffebee; color: #e74c3c; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-section" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info"><h2>Palash Mahmod</h2><p>BSC(SCIENCE), MSC(BOTANY)</p><p>Mob: 01757935522</p></div>
    </div>
    <hr class="divider">
    <h2 style="color: var(--primary); margin-top: 0;">শিক্ষার্থী প্রবেশদ্বার</h2>
    <input type="text" id="uName" placeholder="সম্পূর্ণ নাম">
    <div style="display: flex; gap: 10px;">
        <input type="text" id="uClass" placeholder="শ্রেণি">
        <input type="text" id="uSection" placeholder="শাখা">
    </div>
    <div style="display: flex; gap: 10px;">
        <input type="number" id="uRoll" placeholder="রোল নং">
        <input type="text" id="uID" placeholder="ইউজার আইডি (ID)">
    </div>
    <button class="btn" onclick="login()">প্রবেশ করুন</button>
</div>

<div id="dashboard" class="card">
    <div class="header-profile">
        <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
        <div class="profile-info"><h2>Palash Mahmod</h2><p>BSC(SCIENCE), MSC(BOTANY)</p><p>Mob: 01757935522</p></div>
    </div>
    <hr class="divider">
    <div class="profile-header">
        <h3 id="welcomeMsg">প্রোফাইল</h3>
        <div class="info-grid">
            <div class="info-item"><b>আইডি নং</b> <span id="dispID"></span></div>
            <div class="info-item"><b>শ্রেণি</b> <span id="dispClass"></span></div>
            <div class="info-item"><b>শাখা</b> <span id="dispSection"></span></div>
            <div class="info-item"><b>রোল</b> <span id="dispRoll"></span></div>
        </div>
    </div>
    <div id="netStatus"></div>
    <div id="quizList"></div>
    <div id="noQuiz" style="margin-top:30px; color:#95a5a6; border:2px dashed #ddd; padding:20px; border-radius:15px; display:none;">বর্তমানে কোনো পরীক্ষা নেই।</div>
    <button class="btn" style="background:#fdf0ef; color:#e74c3c; margin-top:30px; border:1px solid #fadbd8;" onclick="logout()">লগআউট করুন</button>
</div>

<script>
    const GITHUB_USER = "palashmahmod";
    const GITHUB_REPO = "quiz-files";
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", 
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    db.ref().child('.info/connected').on('value', () => { syncOfflineResults(); });

    let currentUser = JSON.parse(localStorage.getItem('loggedUser'));

    window.onload = () => {
        checkConnectivity();
        if(currentUser) showDashboard();
        syncOfflineResults(); 
    };

    function login() {
        const name = document.getElementById('uName').value.trim();
        const cls = document.getElementById('uClass').value.trim();
        const sec = document.getElementById('uSection').value.trim();
        const roll = document.getElementById('uRoll').value.trim();
        const id = document.getElementById('uID').value.trim();
        if(!name || !cls || !sec || !roll || !id) return alert("সবগুলো বক্স পূরণ করুন।");
        currentUser = { name, cls, sec, roll, id };
        localStorage.setItem('loggedUser', JSON.stringify(currentUser));
        showDashboard();
    }

    function showDashboard() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = currentUser.name;
        document.getElementById('dispID').innerText = currentUser.id;
        document.getElementById('dispClass').innerText = currentUser.cls;
        document.getElementById('dispSection').innerText = currentUser.sec;
        document.getElementById('dispRoll').innerText = currentUser.roll;
        fetchAssignedQuizzes();
    }

    function fetchAssignedQuizzes() {
        const quizListDiv = document.getElementById('quizList');
        const noQuizDiv = document.getElementById('noQuiz');
        db.ref('quiz_control').on('value', (snapshot) => {
            const allQuizzes = snapshot.val();
            quizListDiv.innerHTML = '';
            let foundAny = false;
            if (allQuizzes) {
                for (let quizName in allQuizzes) {
                    if (allQuizzes[quizName][currentUser.id] === true) {
                        foundAny = true;
                        createQuizCard(quizName);
                    }
                }
            }
            noQuizDiv.style.display = foundAny ? 'none' : 'block';
        });
    }

    function createQuizCard(quizName) {
        const div = document.createElement('div');
        div.className = 'quiz-card';
        div.innerHTML = `
            <span class="status-badge online">নতুন পরীক্ষা</span><br>
            <b style="color:var(--primary)">${quizName}.html</b>
            <button class="btn" onclick="startQuiz('${quizName}', this)">পরীক্ষা শুরু করুন</button>
        `;
        document.getElementById('quizList').appendChild(div);
    }

    async function startQuiz(quizName, btn) {
        btn.innerHTML = '<span class="loader"></span> লোড হচ্ছে...';
        btn.disabled = true;
        try {
            // ক্যাশ সমস্যা এড়াতে ইউনিক টাইমস্ট্যাম্প যোগ করা হয়েছে
            const fileUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${quizName}.html?nocache=${new Date().getTime()}`;
            
            const response = await fetch(fileUrl, { 
                cache: "no-store",
                headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
            });

            if (!response.ok) throw new Error();
            const htmlContent = await response.text();
            
            document.open();
            document.write(htmlContent);
            document.close();
            
            setupMessageListener(quizName);
        } catch (error) {
            alert("ফাইল পাওয়া যায়নি বা ইন্টারনেট সংযোগ বিচ্ছিন্ন।");
            btn.innerText = 'পরীক্ষা শুরু করুন';
            btn.disabled = false;
        }
    }

    function setupMessageListener(quizName) {
        window.onmessage = function(e) {
            if (e.data.type === 'QUIZ_SUBMITTED') {
                const now = new Date();
                const shortDate = now.toLocaleDateString();
                const shortTime = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                
                const fullResult = {
                    ...e.data.data,
                    id: currentUser.id, 
                    name: currentUser.name,
                    class: currentUser.cls, 
                    section: currentUser.sec,
                    roll: currentUser.roll, 
                    quizName: quizName,
                    submitTime: shortDate + ", " + shortTime
                };

                saveResultLocally(fullResult);
                syncOfflineResults();
                
                alert("আপনার পরীক্ষা সম্পন্ন হয়েছে! ফলাফল দেখা শেষ হলে ড্যাশবোর্ডে ফিরুন।");

                const backBtn = document.createElement('button');
                backBtn.innerHTML = '⬅ ড্যাশবোর্ডে ফিরুন';
                backBtn.style = "position:fixed; top:10px; left:10px; z-index:99999; padding:12px 20px; background:#e74c3c; color:white; border:none; border-radius:30px; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.3); cursor:pointer;";
                backBtn.onclick = function() { location.reload(); };
                document.body.appendChild(backBtn);

                window.history.pushState(null, null, window.location.href);
                window.onpopstate = function() {
                    if(confirm("আপনি কি ড্যাশবোর্ডে ফিরে যেতে চান?")) {
                        location.reload();
                    } else {
                        window.history.pushState(null, null, window.location.href);
                    }
                };
            }
        };
    }

    function saveResultLocally(data) {
        let queue = JSON.parse(localStorage.getItem('pendingResults') || '[]');
        queue.push(data);
        localStorage.setItem('pendingResults', JSON.stringify(queue));
    }

    function syncOfflineResults() {
        if (!navigator.onLine) return;
        let queue = JSON.parse(localStorage.getItem('pendingResults') || '[]');
        if (queue.length === 0) return;
        queue.forEach((res, index) => {
            db.ref('quiz_results').push(res).then(() => {
                db.ref(`quiz_control/${res.quizName}/${res.id}`).set(false);
                queue.splice(index, 1);
                localStorage.setItem('pendingResults', JSON.stringify(queue));
            }).catch(e => console.log("Sync Error:", e));
        });
    }

    function checkConnectivity() {
        const status = document.getElementById('netStatus');
        const update = () => {
            status.innerHTML = navigator.onLine ? 
                '<span class="status-badge online">● ইন্টারনেট সংযুক্ত</span>' : 
                '<span class="status-badge offline">○ অফলাইন (ফলাফল পরে জমা হবে)</span>';
            if(navigator.onLine) syncOfflineResults();
        };
        window.addEventListener('online', update);
        window.addEventListener('offline', update);
        update();
    }

    function logout() {
        const pass = prompt("লগআউট করতে পাসওয়ার্ড দিন:");
        if (pass === "pm5522") {
            localStorage.removeItem('loggedUser');
            location.reload();
        } else if (pass !== null) {
            alert("ভুল পাসওয়ার্ড!");
        }
    }
</script>
</body>
</html>
