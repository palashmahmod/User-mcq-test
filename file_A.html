<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ফলাফল তালিকা</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #2c3e50; --bg: #f0f2f5; --danger: #e74c3c; --success: #27ae60; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .header-nav { display: flex; align-items: center; justify-content: space-between; max-width: 600px; margin: 0 auto 20px; }
        .back-btn { background: #e8eaed; color: #333; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; border: 1px solid #666; cursor: pointer; }
        
        .search-container { max-width: 600px; margin: 0 auto 20px; }
        #searchBox { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #666; box-sizing: border-box; outline: none; font-size: 14px; }
        
        .result-list { max-width: 600px; margin: 0 auto; }
        .result-card { background: var(--card-bg); border-radius: 15px; border: 1px solid #666; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; border-left: 5px solid var(--p); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .student-info h3 { margin: 0; color: #333; font-size: 1.1rem; }
        .student-id { color: #666; font-size: 14px; font-weight: normal; }
        
        .info-row { display: flex; align-items: center; gap: 12px; margin: 6px 0; color: #444; font-size: 14px; line-height: 1.4; }
        .info-row i { width: 18px; color: #555; }
        
        .badge-container { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; display: inline-block; }
        .badge-success { background: #e8f5e9; color: var(--success); }
        .badge-error { background: #ffebee; color: var(--danger); width: 100%; box-sizing: border-box; }
        .loader { text-align: center; margin-top: 50px; font-size: 20px; color: #666; }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> ব্যাক</a>
    <h2 style="margin:0; flex-grow: 1; text-align: center; font-size: 22px;">আমার ফলাফল</h2>
    <div style="width: 80px;"></div> 
</div>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="বিষয় বা কুইজের নাম দিয়ে খুঁজুন..." onkeyup="filterResults()">
</div>

<div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...</div>
<div id="resultArea" class="result-list"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", 
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/", 
        projectId: "quiz-storage-d8707" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const currentLoggedInUser = localStorage.getItem('userId') || ""; 

    // ইংরেজি সংখ্যাকে বাংলায় কনভার্ট করার ফাংশন
    function getBengaliRank(rank) {
        const bengaliDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
        let rankStr = rank.toString().split('').map(digit => bengaliDigits[digit] || digit).join('');
        
        if (rank === 1) return rankStr + "ম";
        if (rank === 2) return rankStr + "য়";
        if (rank === 3) return rankStr + "য়";
        if (rank === 4) return rankStr + "র্থ";
        if (rank === 5) return rankStr + "ম";
        if (rank === 6) return rankStr + "ষ্ঠ";
        if (rank === 7 || rank === 8 || rank === 9 || rank === 10) return rankStr + "ম";
        return rankStr + "তম";
    }

    function loadResults() {
        db.ref("QuizResults").on("value", (snapshot) => {
            document.getElementById('loading').style.display = 'none';
            const area = document.getElementById('resultArea');
            area.innerHTML = "";
            
            if (!snapshot.exists()) {
                area.innerHTML = "<p style='text-align:center;'>কোনো ফলাফল পাওয়া যায়নি।</p>";
                return;
            }

            const allResults = [];
            snapshot.forEach((child) => {
                allResults.push({ key: child.key, data: child.val() });
            });

            function timeToSeconds(timeStr) {
                if (!timeStr) return 999999;
                const matches = timeStr.match(/(\d+)m\s*(\d+)s/);
                if (matches) {
                    return (parseInt(matches[1], 10) * 60) + parseInt(matches[2], 10);
                }
                const secMatch = timeStr.match(/(\d+)s/);
                if (secMatch) return parseInt(secMatch[1], 10);
                return 999999;
            }

            // শ্রেণি এবং কুইজ অনুযায়ী গ্রুপ তৈরি
            const groups = {};
            allResults.forEach(item => {
                const className = item.data.class || 'N/A';
                const quizName = item.data.quizTitle || 'N/A';
                const groupKey = `${className}_${quizName}`;

                if (!groups[groupKey]) {
                    groups[groupKey] = [];
                }
                groups[groupKey].push(item);
            });

            // প্রতিটি গ্রুপের সর্টিং ও গ্লোবাল মেধাক্রম ম্যাপ তৈরি
            const rankedResultsMap = {};
            Object.keys(groups).forEach(groupKey => {
                const currentGroup = groups[groupKey];
                const totalParticipants = currentGroup.length; // মোট কতজন অংশ নিয়েছে তা বের করা হলো

                currentGroup.sort((a, b) => {
                    const correctA = parseInt(a.data.correct || 0, 10);
                    const correctB = parseInt(b.data.correct || 0, 10);
                    
                    if (correctB !== correctA) {
                        return correctB - correctA;
                    } else {
                        return timeToSeconds(a.data.timeSpent) - timeToSeconds(b.data.timeSpent);
                    }
                });

                // কার মেধা স্থান কত এবং ঐ গ্রুপে মোট কতজন তা ম্যাপে স্টোর করা
                currentGroup.forEach((item, index) => {
                    rankedResultsMap[item.key] = {
                        rank: index + 1,
                        totalCount: totalParticipants
                    };
                });
            });

            // শুধুমাত্র লগইন থাকা ইউজারের নিজস্ব কুইজ ডেটা ফিল্টার করা
            const userResultsArray = allResults.filter(item => currentLoggedInUser !== "" && item.data.userId === currentLoggedInUser);

            if (userResultsArray.length === 0) {
                area.innerHTML = "<p style='text-align:center;'>আপনার কোনো ফলাফলের তথ্য পাওয়া যায়নি।</p>";
                return;
            }

            userResultsArray.reverse().forEach((item) => {
                const data = item.data;
                const key = item.key;
                const rankInfo = rankedResultsMap[key];
                const bengaliRank = getBengaliRank(rankInfo.rank);
                
                // ইংরেজি সংখ্যাকে বাংলায় কনভার্ট করার ইন্টারনাল লজিক (অংশগ্রহণকারীর জন্য)
                const bengaliDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
                let totalParticipantsBn = rankInfo.totalCount.toString().split('').map(digit => bengaliDigits[digit] || digit).join('');

                const card = `
                <div class="result-card" data-search="${data.quizTitle} ${data.subject || ''}">
                    <div class="card-header">
                        <div class="student-info">
                            <h3>${data.name} <span class="student-id">(ID: ${data.userId || 'N/A'})</span></h3>
                        </div>
                    </div>
                    
                    <div class="info-row"><i class="fas fa-book"></i> <b>কুইজ:</b> ${data.quizTitle} | <b>বিষয়:</b> ${data.subject || 'N/A'}</div>
                    <div class="info-row"><i class="fas fa-graduation-cap"></i> <b>শ্রেণি:</b> ${data.class || 'N/A'} | <b>শাখা:</b> ${data.section || 'N/A'} | <b>রোল:</b> ${data.roll || 'N/A'}</div>
                    <div class="info-row"><i class="fas fa-clock"></i> <b>সময়:</b> ${data.date || ''}, ${data.time || ''}, (${data.timeSpent || '0m 0s'})</div>
                    
                    <div class="badge-container">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="badge badge-success">সঠিক: ${data.correct} / ${data.total}</span>
                            <span class="badge" style="background: #e3f2fd; color: #0d47a1;"><i class="fas fa-trophy"></i> মেধা স্থান: ${bengaliRank} (${totalParticipantsBn} জন)</span>
                        </div>
                        <div class="badge badge-error">ভুল প্রশ্ন নং: ${data.wrongQuestions || 'সব সঠিক'}</div>
                    </div>
                </div>
                `;
                area.innerHTML += card;
            });
        });
    }

    function filterResults() {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const cards = document.querySelectorAll('.result-card');
        
        cards.forEach(card => {
            const text = card.getAttribute('data-search').toLowerCase();
            card.style.display = text.includes(query) ? "block" : "none";
        });
    }

    loadResults();
</script>
</body>
</html>
